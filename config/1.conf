# This is the first full config, aiming to test a myriad of features in a single file

error_log error.log;

server {
    listen 0.0.0.0 8080;
    listen 127.0.0.1 10080;  # Localhost only

    error_page 404              html/404.html;
    error_page 500 502 503 504  html/50x.html;

    client_max_body_size 1m;

    timeout 300;

    location / {
        allowed_methods GET;

        root html;

        index index.html;
    }

    location /upload {
        allowed_methods POST DELETE;
        root html;

        upload_store html/resources/images;
    }

    location /images {
        allowed_methods GET POST ;
        root html/resources;

        autoindex on;
    }

    location /this/is/root/ {
        allowed_methods GET;

        # Redirect all queries to /this/is/root/ to the root location
        redirect 301 /;
    }
}

server {
    listen 0.0.0.0 10443;  # This isn't HTTPS, I just needed a third random-ish port

    location /cgi {
        root html/resources/cgi/;

        cgi py /usr/bin/python3;
    }
}
