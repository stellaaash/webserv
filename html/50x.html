<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>50X Onyooo~ :3</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      color: black;
      font-family: "Comic Sans MS", cursive;
      text-align: center;
    }

    h1 {
      font-size: 2em;
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 20px;
    }

    .miku {
      width: 150px;
      transition: transform 0.6s ease;
      transform-style: preserve-3d;
    }

    /* crazy flipping */
    .miku-div:hover .miku {
      transform: rotateY(360deg);
    }
  </style>
</head>
<body>

  <div>
    <h1>50X Onyooo~ :3</h1>
    <p>oopsie occurred D:</p>

    <div class="miku-div">
      <img src="resources/images/error/50x.png" class="miku" alt="miku">
    </div>
  </div>

</body>
</html>
